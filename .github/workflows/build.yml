name: Build

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.1.0"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Remove local Java home override
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ github.ref_name }}
        run: ./gradlew assembleRelease

      - name: Compute APK slug
        id: slug
        run: echo "value=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            gh release create "dev-run-${{ github.run_number }}" \
              --target "${{ github.sha }}" \
              --title "Dev build #${{ github.run_number }} (${{ github.ref_name }})" \
              --prerelease \
              --notes "Manual build from branch \`${{ github.ref_name }}\`, run #${{ github.run_number }}." \
              "app/build/outputs/apk/release/app-release.apk#un-locker-${{ steps.slug.outputs.value }}.apk"
          else
            gh release create "${{ github.ref_name }}" \
              --title "Un-Locker ${{ github.ref_name }}" \
              --generate-notes \
              "app/build/outputs/apk/release/app-release.apk#un-locker-${{ github.ref_name }}.apk"
          fi
